<!DOCTYPE html>
<html>
<head>
<style>
  /* Estilo da barra de vida */
  .container-vida {
    width: 300px;
    background-color: #555;
    border: 3px solid #000;
    border-radius: 10px;
  }

  #barra {
    width: 100%; /* Começa com 100% de vida */
    height: 30px;
    background-color: #4CAF50; /* Cor verde */
    text-align: center;
    line-height: 30px;
    color: white;
    font-weight: bold;
    transition: width 0.3s; /* Suaviza a mudança */
  }
</style>
</head>
<body>

<h2>Minha Vida</h2>

<div class="container-vida">
  <div id="barra">100%</div>
</div>

<br>
<button onclick="alterarVida(-10)">Levar Dano (-10)</button>
<button onclick="alterarVida(10)">Curar (+10)</button>

<script>
  let vidaAtual = 100;

  function alterarVida(valor) {
    vidaAtual += valor;

    // Impede a vida de ser menor que 0 ou maior que 100
    if (vidaAtual < 0) vidaAtual = 0;
    if (vidaAtual > 100) vidaAtual = 100;

    // Atualiza visualmente a barra e o texto
    const barra = document.getElementById("barra");
    barra.style.width = vidaAtual + "%";
    barra.innerText = vidaAtual + "%";

    // Muda a cor se a vida estiver baixa
    if (vidaAtual < 30) {
      barra.style.backgroundColor = "#f44336"; // Vermelho
    } else {
      barra.style.backgroundColor = "#4CAF50"; // Verde
    }
  }
</script>

</body>
</html>

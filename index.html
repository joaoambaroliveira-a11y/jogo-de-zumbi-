<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zumbi Clicker</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        #cenario { 
            position: relative; 
            width: 800px; height: 500px; 
            background: #333; margin: 20px auto; 
            border: 4px solid #555; cursor: crosshair;
            overflow: hidden;
        }
        .zumbi { 
            position: absolute; 
            width: 50px; height: 50px; 
            background-color: #4CAF50; /* Cor do zumbi */
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer;
        }
        #placar { font-size: 24px; }
    </style>
</head>
<body>

    <h1>Zumbi Clicker</h1>
    <div id="placar">Pontos: 0</div>
    
    <div id="cenario" onclick="errarTiro()">
        </div>

    <script>
        let pontos = 0;
        const cenario = document.getElementById('cenario');
        const placar = document.getElementById('placar');

        function criarZumbi() {
            const zumbi = document.createElement('div');
            zumbi.className = 'zumbi';
            zumbi.innerHTML = '🧟'; // Emoji de zumbi
            
            // Posição aleatória dentro do cenário
            const x = Math.random() * (750);
            const y = Math.random() * (450);
            
            zumbi.style.left = x + 'px';
            zumbi.style.top = y + 'px';

            // Quando clicar no zumbi (acertar o tiro)
            zumbi.onclick = function(e) {
                e.stopPropagation(); // Impede de contar como erro no cenário
                pontos++;
                placar.innerText = "Pontos: " + pontos;
                this.remove(); // Remove o zumbi
            };

            cenario.appendChild(zumbi);

            // O zumbi some sozinho depois de 1.5 segundos se não for clicado
            setTimeout(() => {
                if(zumbi.parentElement) zumbi.remove();
            }, 1500);
        }

        function errarTiro() {
            if (pontos > 0) pontos--; // Penalidade por errar o clique
            placar.innerText = "Pontos: " + pontos;
        }

        // Cria um novo zumbi a cada 1 segundo
        setInterval(criarZumbi, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zumbi Survival - Health Bar</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Courier New', Courier, monospace; text-align: center; }
        
        /* Estilo da Barra de Vida */
        #container-vida {
            width: 400px;
            height: 25px;
            background-color: #444;
            border: 2px solid #fff;
            margin: 10px auto;
            border-radius: 5px;
            overflow: hidden;
        }

        #barra-progresso {
            width: 100%;
            height: 100%;
            background-color: #2ecc71; /* Verde inicial */
            transition: width 0.2s, background-color 0.3s;
        }

        #cenario { 
            position: relative; 
            width: 800px; height: 500px; 
            background: #222; margin: 20px auto; 
            border: 4px solid #555; cursor: crosshair;
            overflow: hidden;
        }

        .zumbi { 
            position: absolute; 
            width: 60px; height: 60px; 
            font-size: 40px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            user-select: none;
        }
    </style>
</head>
<body>

    <h1>ZUMBI SURVIVAL</h1>
    
    <div id="container-vida">
        <div id="barra-progresso"></div>
    </div>
    
    <div id="status">Vida: 100% | Pontos: 0</div>
    
    <div id="cenario"></div>

    <script>
        let pontos = 0;
        let vida = 100;
        let jogoAtivo = true;

        const cenario = document.getElementById('cenario');
        const barra = document.getElementById('barra-progresso');
        const statusTexto = document.getElementById('status');

        function atualizarInterface() {
            barra.style.width = vida + "%";
            statusTexto.innerText = `Vida: ${vida}% | Pontos: ${pontos}`;

            // Muda cor da barra conforme a vida desce
            if (vida <= 30) {
                barra.style.backgroundColor = "#e74c3c"; // Vermelho
            } else if (vida <= 60) {
                barra.style.backgroundColor = "#f1c40f"; // Amarelo
            }
        }

        function criarZumbi() {
            if (!jogoAtivo) return;

            const zumbi = document.createElement('div');
            zumbi.className = 'zumbi';
            zumbi.innerHTML = '🧟';
            
            zumbi.style.left = Math.random() * 740 + 'px';
            zumbi.style.top = Math.random() * 440 + 'px';

            let clicado = false;

            zumbi.onclick = function() {
                if (!jogoAtivo) return;
                clicado = true;
                pontos += 10;
                atualizarInterface();
                this.remove();
            };

            cenario.appendChild(zumbi);

            // Se o jogador não clicar em 1.2 segundos, perde vida
            setTimeout(() => {
                if (!clicado && jogoAtivo) {
                    vida -= 10;
                    atualizarInterface();
                    zumbi.style.filter = "grayscale(100%)"; // Efeito visual de falha
                    setTimeout(() => zumbi.remove(), 200);

                    if (vida <= 0) gameOver();
                }
            }, 1200);
        }

        function gameOver() {
            jogoAtivo = false;
            alert("GAME OVER! Você sobreviveu com " + pontos + " pontos.");
            location.reload(); // Reinicia o jogo
        }

        // Gera zumbis infinitamente
        setInterval(criarZumbi, 800);
    </script>
</body>
</html>
